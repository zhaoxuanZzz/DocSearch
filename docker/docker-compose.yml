services:
  # PostgreSQL 16 with pgvector and ParadeDB pg_search
  postgres:
    image: paradedb/paradedb:latest
    container_name: docsearch-postgres
    environment:
      POSTGRES_USER: docsearch
      POSTGRES_PASSWORD: docsearch
      POSTGRES_DB: docsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: docsearch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: docsearch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/docsearch;
      mc anonymous set none local/docsearch;
      echo 'MinIO bucket initialized';
      "

  # Redis
  redis:
    image: redis:7-alpine
    container_name: docsearch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: docsearch-celery-worker
    command: celery -A src.ingestion.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg://docsearch:docsearch@postgres:5432/docsearch
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: docsearch
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
    profiles:
      - full

volumes:
  postgres_data:
  minio_data:
  redis_data:
